<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Diamond Casino Resort</title>
    <link rel="icon" href="../home/imgs/Casino_Icon.png">
    <link rel="stylesheet" href="./jogo.css">
    <script src="./jogo.js"></script>
    </link>
</head>

<body>
    <div class="background" id="CONFIG">
        <div class="fade">
            <div class="configJogo">
                <div id="jogadores">
                    <div class="jogador" id="jogador1" style="display: flex;">
                        <img src="./imgs/Jogaror_Icon.png" id="jogadorImage" style="width: 100px; height: 100px;">
                        500
                        <input type="text" id="ipt_jogador1" placeholder="Jogador1">
                    </div>
                    <div class="jogador" id="jogador2" style="display: none;">
                        <img src="./imgs/Jogaror_Icon.png" id="jogadorImage" style="width: 100px; height: 100px;">
                        500
                        <input type="text" id="ipt_jogador2" placeholder="Jogador2">
                    </div>
                    <div class="jogador" id="jogador3" style="display: none;">
                        <img src="./imgs/Jogaror_Icon.png" id="jogadorImage" style="width: 100px; height: 100px;">
                        500
                        <input type="text" id="ipt_jogador3" placeholder="Jogador3">
                    </div>
                </div>
                <button onclick="addJogador()">Adcionar Jogadores</button>
                <div id="voltas" style="display: flex; flex-direction: column; text-align: center;">
                    Quantidade de voltas
                    <input type="number" id="qtd_voltas" value="1" placeholder="1" min="1">
                </div>
                <div id="cavalos" style="display: flex; flex-direction: column; text-align: center;">
                    Quantidade de Cavalos
                    <input type="number" id="qtd_cavalos" placeholder="Mínimo 2 e Máximo 6" min="1" max="6">
                </div>
                <button onclick="apostar()">apostar</button>
            </div>
        </div>
    </div>

    <div class="background" id="APOSTA">
        <div class="fadeAposta">
            <div class="cavalosAposta">
                <div class="cavalo" id="1">
                    <img id="IconCavalo" src="./imgs/Cavalo_Preto_Icon.png">
                    <input type="text" id="ipt_nomeCavalo1" placeholder="Destruidor de Sonhos">
                </div>
                <div class="cavalo" id="2">
                    <img id="IconCavalo" src="./imgs/Cavalo_Branco_Icon.png">
                    <input type="text" id="ipt_nomeCavalo2" placeholder="Sr. Vale a Pena">
                </div>
                <div class="cavalo" id="3">
                    <img id="IconCavalo" src="./imgs/Cavalo_Roxo_Icon.png">
                    <input type="text" id="ipt_nomeCavalo3" placeholder="Inferno pelo Clima">
                </div>
                <div class="cavalo" id="4">
                    <img id="IconCavalo" src="./imgs/Cavalo_Verde_Icon.png">
                    <input type="text" id="ipt_nomeCavalo4" placeholder="Dinheiro Fácil/Idiota">
                </div>
                <div class="cavalo" id="5">
                    <img id="IconCavalo" src="./imgs/Cavalo_Vermelho_Icon.png">
                    <input type="text" id="ipt_nomeCavalo5" placeholder="Quente e Incomodado">
                </div>
                <div class="cavalo" id="6">
                    <img id="IconCavalo" src="./imgs/Cavalo_Amarelo_Icon.png">
                    <input type="text" id="ipt_nomeCavalo6" placeholder="Pangaré Magrelo">
                </div>
            </div>
            <div class="jogadorAposta">
                <div id="jogadoresAposta">
                    <div class="jogador" id="jogador1" style="display: flex;">
                        <img src="./imgs/Jogaror_Icon.png" id="jogadorImage" style="width: 100px; height: 100px;">
                        <div id="nomeJogadorAposta1" style="color: white; margin-bottom: 10px;">Grupo1</div>
                        500
                    </div>
                    <div class="jogador" id="jogador2" style="display: flex;">
                        <img src="./imgs/Jogaror_Icon.png" id="jogadorImage" style="width: 100px; height: 100px;">
                        <div id="nomeJogadorAposta2" style="color: white; margin-bottom: 10px;">Grupo6</div>
                        500
                    </div>
                    <div class="jogador" id="jogador3" style="display: flex;">
                        <img src="./imgs/Jogaror_Icon.png" id="jogadorImage" style="width: 100px; height: 100px;">
                        <div id="nomeJogadorAposta3" style="color: white; margin-bottom: 10px;">Grupo8</div>
                        500
                    </div>
                </div>
                <button onclick="iniciarCorrida()">Jogar</button>
            </div>
        </div>
    </div>

    <div class="background" id="CORRIDA">
        <div class="placar">
            <div class="corredor" id="1">
                <img id="IconCavalo" src="./imgs/Cavalo_Preto_Icon.png">
                <div id="tempo" id="1"></div>
            </div>
            <div class="corredor" id="2">
                <img id="IconCavalo" src="./imgs/Cavalo_Branco_Icon.png">
                <div id="tempo" id="2"></div>
            </div>
            <div class="corredor" id="3">
                <img id="IconCavalo" src="./imgs/Cavalo_Roxo_Icon.png">
                <div id="tempo" id="3"></div>
            </div>
            <div class="corredor" id="4">
                <img id="IconCavalo" src="./imgs/Cavalo_Verde_Icon.png">
                <div id="tempo" id="4"></div>
            </div>
            <div class="corredor" id="5">
                <img id="IconCavalo" src="./imgs/Cavalo_Vermelho_Icon.png">
                <div id="tempo" id="5"></div>
            </div>
            <div class="corredor" id="6">
                <img id="IconCavalo" src="./imgs/Cavalo_Amarelo_Icon.png">
                <div id="tempo" id="6"></div>
            </div>
        </div>
        <div class="corrida">
            <div id="linhasVoltas"></div>
            <div class="cavaloCorrida" id="1">
                <img id="CavaloCorrendo" src="./imgs/horse-gallop.gif" style="transform: scaleX(-1);">
            </div>
            <div class="cavaloCorrida" id="2">
                <img id="CavaloCorrendo" src="./imgs/Cavalo_Branco.gif" style="transform: scaleX(-1);">
            </div>
            <div class="cavaloCorrida" id="3">
                <img id="CavaloCorrendo" src="./imgs/Cavalo_Roxo.gif" style="transform: scaleX(-1);">
            </div>
            <div class="cavaloCorrida" id="4">
                <img id="CavaloCorrendo" src="./imgs/Cavalo_Verde.gif" style="transform: scaleX(-1);">
            </div>
            <div class="cavaloCorrida" id="5">
                <img id="CavaloCorrendo" src="./imgs/Cavalo_Vermelho.gif" style="transform: scaleX(-1);">
            </div>
            <div class="cavaloCorrida" id="6">
                <img id="CavaloCorrendo" src="./imgs/Cavalo_Amarelo.gif" style="transform: scaleX(-1);">
            </div>
        </div>
    </div>

    <div class="background" id="PODIO">
        <div class="podio">
            <h1>PÓDIO</h1>
            <div class="podioTop3">
                <div class="lugar" id="primeiro">
                    <h2>🥇Lugar</h2>
                    <p class="nome"></p>
                    <p class="tempo"></p>
                </div>
                <div class="lugar" id="segundo">
                    <h2>🥈Lugar</h2>
                    <p class="nome"></p>
                    <p class="tempo"></p>
                </div>
                <div class="lugar" id="terceiro">
                    <h2>🥉Lugar</h2>
                    <p class="nome"></p>
                    <p class="tempo"></p>
                </div>
            </div>
            <div class="apostas" id="apostas"></div>
        </div>
    </div>
</body>

</html>
<script>
    var qtdJogadores = 1;
    var qtdVoltas = 1;
    var qtdCavalos = 2;
    var apostas = [];
    var jogadores = [];
    var cavalos = [];

    function addJogador() {

        if (qtdJogadores < 3) {
            qtdJogadores++;

            document.getElementById("jogador" + qtdJogadores).style.display = "flex";
        }

    }

    function apostar() {

        qtdVoltas = Number(document.getElementById("qtd_voltas").value);
        qtdCavalos = Number(document.getElementById("qtd_cavalos").value);

        if (qtdCavalos < 2 || qtdCavalos > 6) {
            alert("Escolha entre 2 e 6 cavalos");
            return;
        }

        jogadores = [];

        for (var i = 1; i <= qtdJogadores; i++) {

            var nomeJogador = document.getElementById("ipt_jogador" + i).value;

            if (nomeJogador == "") {
                nomeJogador = "Jogador " + i;
            }

            jogadores.push(nomeJogador);

            document.getElementById("nomeJogadorAposta" + i).innerHTML = nomeJogador;
        }

        for (var i = qtdJogadores + 1; i <= 3; i++) {
            document.getElementById("nomeJogadorAposta" + i).parentElement.style.display = "none";
        }

        for (var i = 1; i <= 6; i++) {

            var cavalo = document.querySelector(".cavalosAposta .cavalo:nth-child(" + i + ")");

            if (i <= qtdCavalos) {
                cavalo.style.display = "flex";
            } else {
                cavalo.style.display = "none";
            }

        }

        document.getElementById("CONFIG").style.display = "none";
        document.getElementById("APOSTA").style.display = "flex";

        apostas = [];

        for (var i = 1; i <= qtdJogadores; i++) {

            var nomeJogador = document.getElementById("ipt_jogador" + i).value;

            if (nomeJogador == "") {
                nomeJogador = "Jogador " + i;
            }
            apostas.push({
                jogador: nomeJogador,
                cavalo: i
            });

            document.getElementById("nomeJogadorAposta" + i).innerHTML = nomeJogador;
        }
    }

    function iniciarCorrida() {

        cavalos = [];

        for (var i = 1; i <= qtdCavalos; i++) {

            var input = document.getElementById("ipt_nomeCavalo" + i);

            var nomeCavalo = input.value;

            if (nomeCavalo == "") {
                nomeCavalo = input.placeholder;
            }

            cavalos.push({
                numero: i,
                nome: nomeCavalo,
                voltas: 0,
                tempo: 0
            });

        }

        document.getElementById("APOSTA").style.display = "none";
        document.getElementById("CORRIDA").style.display = "flex";

        setTimeout(function () {

            for (var i = 0; i < cavalos.length; i++) {
                cavalos[i].tempo = (Math.random() * 99 + 1).toFixed(1);
            }

            cavalos.sort(function (a, b) {
                return a.tempo - b.tempo;
            });

            function acharJogadorDoCavalo(numeroCavalo) {
                for (var i = 0; i < apostas.length; i++) {
                    if (apostas[i].cavalo == numeroCavalo) {
                        return apostas[i].jogador;
                    }
                }
                return "Sem jogador";
            }

            document.querySelector("#primeiro .nome").innerHTML =
                cavalos[0].nome + " (" + acharJogadorDoCavalo(cavalos[0].numero) + ")";

            document.querySelector("#primeiro .tempo").innerHTML = cavalos[0].tempo + "s";

            document.querySelector("#segundo .nome").innerHTML =
                cavalos[1].nome + " (" + acharJogadorDoCavalo(cavalos[1].numero) + ")";

            document.querySelector("#segundo .tempo").innerHTML = cavalos[1].tempo + "s";

            if (cavalos.length >= 3) {
                document.querySelector("#terceiro .nome").innerHTML =
                    cavalos[2].nome + " (" + acharJogadorDoCavalo(cavalos[2].numero) + ")";

                document.querySelector("#terceiro .tempo").innerHTML = cavalos[2].tempo + "s";
            } else {
                document.querySelector("#terceiro .nome").innerHTML = "-";
                document.querySelector("#terceiro .tempo").innerHTML = "-";
            }

            document.getElementById("CORRIDA").style.display = "none";
            document.getElementById("PODIO").style.display = "flex";

        }, 5000);
    }
</script>
